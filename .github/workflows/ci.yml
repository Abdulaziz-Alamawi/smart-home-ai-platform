name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  ai-engine:
    name: AI Engine (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-engine/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  backend:
    name: Backend (Node/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4010/api/v1

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [ai-engine, backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build AI engine image
        run: docker build -t shai-ai-engine ./ai-engine
      - name: Build backend image
        run: docker build -t shai-backend ./backend
      - name: Build frontend image
        run: docker build -t shai-frontend ./frontend
